<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}URL Shortener{% endblock %}</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --error: #f87171;
        --success: #4ade80;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        width: 100%;
        max-width: 32rem;
        background: var(--panel);
        border: 1px solid #1f2937;
        border-radius: 0.75rem;
        padding: 2rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      }
      h1 { margin-top: 0; font-size: 1.5rem; }
      p.lead { color: var(--muted); margin-top: -0.5rem; }
      label { display: block; margin: 1rem 0 0.25rem; font-size: 0.875rem; color: var(--muted); }
      input[type="url"], input[type="text"] {
        width: 100%;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #1f2937;
        border-radius: 0.5rem;
        background: #0b1220;
        color: var(--text);
      }
      button {
        margin-top: 1.25rem;
        width: 100%;
        padding: 0.75rem;
        font-size: 1rem;
        background: var(--accent);
        color: #0b1220;
        border: 0;
        border-radius: 0.5rem;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover { filter: brightness(1.05); }
      .flash { margin: 1rem 0 0; padding: 0.6rem 0.75rem; border-radius: 0.5rem; font-size: 0.9rem; }
      .flash.error { background: rgba(248, 113, 113, 0.15); color: var(--error); }
      .flash.success { background: rgba(74, 222, 128, 0.15); color: var(--success); }
      .result {
        margin-top: 1.25rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: #0b1220;
        word-break: break-all;
      }
      .result a { color: var(--accent); }
      footer { margin-top: 1.5rem; color: var(--muted); font-size: 0.8rem; text-align: center; }
      code { background: #0b1220; padding: 0.125rem 0.35rem; border-radius: 0.25rem; }
    </style>
  </head>
  <body>
    <main class="card">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
